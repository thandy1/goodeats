<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../images/logo.png">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>GoodEats</title>
</head>
<body>

    <!-- Header -->
    <header>
        
        <!-- Checkbox toggler -->
        <input type="checkbox" id="nav-toggle">
        <!-- Hamburger menu -->
        <label for="nav-toggle" id="hamburger-menu">☰</label>

        <!-- Restraunt name -->
        <h1>GoodEats</h1>
     
        <!-- Navbar -->
        <nav id="navbar">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="cart.html">Cart</a>
            <a href="about.html">About Us</a>
        </nav>
        
        <!-- Static icon -->
        <div id="icons">
            <i class="ph ph-magnifying-glass"></i>
            <a href="cart.html"><i class="ph ph-shopping-cart"></i></a>
            <i class="ph ph-user"></i>
        </div>

    </header>

    <!-- Page content -->
    <main>
        <!-- Hero section -->
        <section id="hero-section">
            <div id="hero-image">
                <img src="../images/index_assets/hero.jpg" alt="Delicious food spread from GoodEats">
            </div>
            <div id="hero-content">
                <h2 class="text-2xl">Big Flavors, <br><span class="light-green">One Spot.</span></h2>
                <p class="light-gray text-md">Burgers, tacos, pizza, and more &mdash; all under one roof. Fresh ingredients, bold taste, ready when you are.</p>
                <button type="button" id="cta-button">ORDER NOW</button>
            </div>
        </section>

        <!-- Featured items section -->
        <section id="featured-items">
            <div>
                <!-- Grid of 6 items -->
            </div>
        </section>

        <!-- Contact Us section -->
        <section id="contact-us">
            <!-- Hours of operation, email, phone, location -->
        </section>
    </main>

    <footer>
        <!-- Disclaimer and extra information befitting a footer. Maybe Navigation that maps to a specific section in each page.-->
    </footer>

</body>
</html>
